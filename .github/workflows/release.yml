name: Build and Release .deb Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # Allows creating GitHub Releases

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Dependencies
        run: |
          sudo apt update
          sudo apt install -y dpkg-dev xclip fakeroot

      - name: Build .deb Package
        run: |
          VERSION=$(cat VERSION)
          mkdir -p build/usr/local/bin
          cp tools/*/*.sh build/usr/local/bin/
          chmod +x build/usr/local/bin/*
          mkdir -p build/DEBIAN
          cp debian/control build/DEBIAN/
          cp debian/postinst build/DEBIAN/
          dpkg-deb --build build voidtools_${VERSION}_all.deb

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: voidtools_*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
